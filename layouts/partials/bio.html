<header class="h-card mt-6 gap-5">
  <nav class="flex flex-row gap-6 mb-6">
    <a href="/posts" class="nav-link">Posts</a>
    <a href="/retweets" class="nav-link">Retweets</a>
  </nav>

  <div class="flex flex-row gap-6">
    <img
        fetchpriority="high"
        src="/img/bike.jpg"
        class="u-photo rounded-sm border-1 border-accent-4 sm:w-36 sm:h-36 w-30 h-30"
        alt="{{ .Site.Title }}"
    />
    <div class="flex flex-col items-center mobile:items-start">
      <div>
        <a
          href="https://subdavis.com"
          class="u-url p-name text-2xl -mt-1 text-accent-4 font-bold"
        >
          {{ .Site.Title }}
        </a>
        <span> {{ .Site.Params.Description }} </span>
      </div>

      <div class="mt-3">{{ partial "links.html" . }}</div>
    </div>
  </div>
</header>
